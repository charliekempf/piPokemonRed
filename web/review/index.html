<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>piPokemon Review</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-title">
        <h1>Pi Plays Pokemon</h1>
      </header>
      <aside class="checkpoint-panel">
        <h1>Checkpoints</h1>
        <ol id="checkpoints" class="checkpoint-list"></ol>
        <button id="load-checkpoint-button" class="primary-control" disabled>Load checkpoint</button>
        <div class="simulator-panel">
          <div>
            <span class="simulator-label">Headless simulator</span>
            <strong id="simulate-status">Ready</strong>
          </div>
          <div class="simulator-actions">
            <select id="simulate-digits" aria-label="Digits to simulate">
              <option value="1000">1,000 digits</option>
              <option value="10000" selected>10,000 digits</option>
              <option value="100000">100,000 digits</option>
              <option value="1000000">1,000,000 digits</option>
            </select>
            <button id="simulate-button" class="primary-control">Simulate</button>
          </div>
        </div>
      </aside>
      <section class="screen-panel">
        <div class="screen-shell">
          <canvas id="screen" class="screen" width="160" height="144" aria-label="Game Boy screen"></canvas>
          <div id="fast-forward-overlay" class="fast-forward-overlay" aria-hidden="true">
            <span class="buffer-spinner"></span>
          </div>
        </div>
        <div id="status" class="status-grid" aria-live="polite">
          <div class="stat-card progress-card">
            <span class="stat-label">Digits</span>
            <strong id="stat-digits">-</strong>
            <span id="stat-progress" class="progress-bar"><span></span></span>
          </div>
        </div>
        <div class="controls">
          <label class="speed-row">
            <span>Speed</span>
            <input id="speed" type="range" min="0" max="3" step="0.001" value="0" />
            <strong id="stat-speed">-</strong>
          </label>
          <div class="scale">
            <span>1x</span>
            <span>10x</span>
            <span>100x</span>
            <span>1000x</span>
          </div>
          <label class="check">
            <input id="limiter" type="checkbox" checked />
            <span>Use speed slider</span>
            <strong id="stat-limiter">on</strong>
          </label>
          <div class="transport">
            <button id="pause" class="icon-control play-pause-control" title="Play/Pause" aria-label="Play or pause"></button>
            <button id="rewind-button" class="icon-control" title="Rewind selected digits" aria-label="Rewind selected digits">&lt;&lt;</button>
            <select id="rewind">
              <option value="10">10 digits</option>
              <option value="100">100 digits</option>
              <option value="1000" selected>1,000 digits</option>
              <option value="10000">10,000 digits</option>
              <option value="100000">100,000 digits</option>
              <option value="1000000">1,000,000 digits</option>
            </select>
            <button id="fast-forward-button" class="icon-control" title="Fast-forward selected digits" aria-label="Fast-forward selected digits">&gt;&gt;</button>
          </div>
          <div class="jump-control">
            <label for="jump-digits">Jump to digit</label>
            <input id="jump-digits" type="number" min="0" step="1" inputmode="numeric" placeholder="12,000,000" />
            <button id="jump-button" class="primary-control">Jump</button>
          </div>
        </div>
      </section>
      <section class="event-panel">
        <h1>Event Finder</h1>
        <label for="warp-state">Warp to</label>
        <div class="warp-actions">
          <select id="warp-state" aria-label="State to warp to">
            <option value="battle">Battle</option>
            <option value="scene_change">Scene change</option>
            <option value="blackout">Blackout</option>
          </select>
          <button id="warp-state-button" class="primary-control">Warp</button>
        </div>
      </section>
      <aside class="side-stack">
        <section class="next-panel">
          <h1>Inputs</h1>
          <ol id="inputs" class="inputs"></ol>
        </section>
        <section class="party-panel">
          <h1>Party</h1>
          <ol id="party" class="party-list"></ol>
        </section>
      </aside>
      <section class="timeline-panel">
        <h1>Timeline</h1>
        <div id="timeline" class="timeline"></div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
